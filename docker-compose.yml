version: '3.8'

services:
  # RAG API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    volumes:
      # Mount data directory for persistence
      - ./backend/data:/app/backend/data:ro
      # Mount logs directory
      - ./backend/logs:/app/backend/logs
      # Mount retrieval logs
      - ./backend/retrieval_log.csv:/app/backend/retrieval_log.csv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - rag-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy (uncomment to use)
  # nginx:
  #   image: nginx:alpine
  #   container_name: rag-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
  #   networks:
  #     - rag-network
  #   restart: unless-stopped

networks:
  rag-network:
    driver: bridge

# Usage:
# 1. Copy .env.example to .env and set GEMINI_API_KEY
# 2. Run: docker-compose up -d
# 3. Check status: docker-compose ps
# 4. View logs: docker-compose logs -f api
# 5. Stop: docker-compose down
